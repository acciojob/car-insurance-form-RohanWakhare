<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Insurance Registration Form</title>
</head>
<body>

  <h1>Car Insurance Registration</h1>

  <form method="POST">

    <label for="name">Name</label>
    <input type="text" id="name" required>
    <br><br>

    <label for="email">Email</label>
    <input type="email" id="email" required>
    <br><br>

    <label>Gender</label><br>
    <input type="radio" id="gender_m" name="gender" value="male" required>
    <label for="gender_m">Male</label>
    <input type="radio" id="gender_f" name="gender" value="female">
    <label for="gender_f">Female</label>
    <br><br>

    <label for="cars">Car Brands</label><br>
    <select id="cars">
      <option value="">--Select Car Brand--</option>
      <option value="bmw">BMW</option>
      <option value="audi">Audi</option>
      <option value="mercedez">Mercedez</option>
    </select>
    <br><br>

    <label for="carage">Car Age</label>
    <input type="number" id="carage" required>
    <br><br>

    <label for="dop">Date of Purchase</label>
    <input type="date" id="dop" required>
    <br><br>

    <label for="password">Password</label>
    <input type="password" id="password" required>
    <br><br>

    <button type="submit">Submit</button>

  </form>

</body>
</html>
